<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WISE Dashboard</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Segoe UI,sans-serif;
}

body{
    background:#f5f5f5;
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

.container{
    width:95%;
    max-width:1400px;
    padding:20px;
}

.header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:30px;
}

.logo{
    font-size:60px;
    font-weight:bold;
    color:#0b2245;
}

.datetime{
    font-size:22px;
    font-weight:600;
    color:#0b2245;
}

.main{
    display:flex;
    justify-content:center;
    align-items:flex-start;
    gap:30px;
}

.vehicle-card{
    width:850px;
    height:550px;
    background:linear-gradient(180deg,#07204d,#0d1f3d);
    border:4px solid #ff8c3a;
    border-radius:40px;
    position:relative;
    overflow:hidden;
    cursor:pointer;

    box-shadow:
    0 0 20px rgba(255,140,58,0.4),
    0 0 60px rgba(0,0,0,0.3);

    transition:0.4s;
}

.lock-circle{
    position:absolute;
    top:-70px;
    left:50%;
    transform:translateX(-50%);

    width:140px;
    height:140px;

    border-radius:50%;
    background:#102b58;

    border:5px solid #ff8c3a;

    display:flex;
    justify-content:center;
    align-items:center;

    font-size:70px;

    box-shadow:0 0 20px #ff8c3a;

    transition:0.4s;
}

.locked{
    color:#ff8c3a;
}

.unlocked{
    color:#30ff78;
}

.vehicle-content{
    height:100%;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    color:white;
}

.status-title{
    font-size:28px;
}

.status{
    font-size:60px;
    font-weight:bold;
    transition:0.4s;
}

.car{
    font-size:180px;
    opacity:.25;
}

.battery-card{
    width:350px;
    background:white;
    padding:25px;
    border-radius:25px;
    box-shadow:0 10px 25px rgba(0,0,0,.15);
}

.battery-title{
    font-size:34px;
    margin-bottom:20px;
    color:#0b2245;
}

.battery-row{
    display:flex;
    align-items:center;
    justify-content:space-between;
}

.battery-icon{
    width:140px;
    height:60px;
    border:4px solid #38c172;
    border-radius:10px;
    position:relative;
}

.battery-icon::after{
    content:'';
    position:absolute;
    right:-14px;
    top:15px;
    width:10px;
    height:25px;
    background:#38c172;
    border-radius:3px;
}

.battery-level{
    width:75%;
    height:100%;
    background:linear-gradient(
    90deg,
    #ff6b00,
    #ffb347);
}

.battery-percent{
    font-size:60px;
    font-weight:bold;
    color:#0b2245;
}

.watch-status{
    margin-top:20px;
    font-size:22px;
    color:#0b2245;
}

.signal{
    margin-top:10px;
    font-size:18px;
    color:gray;
}
</style>
</head>

<body>

<div class="container">

    <div class="header">
        <div class="logo">WISE</div>
        <div class="datetime" id="datetime"></div>
    </div>

    <div class="main">

        <div class="vehicle-card" onclick="toggleLock()" id="vehicleCard">

            <div class="lock-circle locked" id="lockIcon">
                🔒
            </div>

            <div class="vehicle-content">

                <div class="status-title">
                    VEHICLE STATUS
                </div>

                <div class="status" id="vehicleStatus">
                    LOCKED
                </div>

                <div class="car">
                    🚗
                </div>

            </div>

        </div>

        <div class="battery-card">

            <div class="battery-title">
                Wearable Battery
            </div>

            <div class="battery-row">

                <div class="battery-icon">
                    <div class="battery-level"></div>
                </div>

                <div class="battery-percent">
                    75%
                </div>

            </div>

            <div class="watch-status">
                Wearable : Connected
            </div>

            <div class="signal">
                Signal : Strong
            </div>

        </div>

    </div>

</div>

<script>

// JAM REALTIME

function updateTime(){

    const now = new Date();

    document.getElementById("datetime").innerHTML =
        now.toLocaleDateString() +
        " | " +
        now.toLocaleTimeString();

}

setInterval(updateTime,1000);
updateTime();


// STATUS KENDARAAN

let locked = true;

function toggleLock(){

    const status =
        document.getElementById("vehicleStatus");

    const lock =
        document.getElementById("lockIcon");

    const card =
        document.getElementById("vehicleCard");

    locked = !locked;

    if(locked){

        status.innerHTML = "LOCKED";
        status.style.color = "#ffffff";

        lock.innerHTML = "🔒";
        lock.className = "lock-circle locked";

        card.style.borderColor = "#ff8c3a";

        card.style.boxShadow =
            "0 0 20px rgba(255,140,58,0.5), 0 0 60px rgba(0,0,0,0.3)";

    }
    else{

        status.innerHTML = "UNLOCKED";
        status.style.color = "#30ff78";

        lock.innerHTML = "🔓";
        lock.className = "lock-circle unlocked";

        card.style.borderColor = "#30ff78";

        card.style.boxShadow =
            "0 0 25px rgba(48,255,120,0.8), 0 0 80px rgba(48,255,120,0.3)";
    }

}

</script>

</body>
</html>
